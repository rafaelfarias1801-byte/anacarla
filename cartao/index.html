<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Carla Sella | Arquiteta & Urbanista</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #0D2E24;
    --green-mid: #153D2F;
    --green-soft: #1D4D3A;
    --offwhite: #F0EDE6;
    --gold: #C8B99A;
    --gold-light: #DDD0B8;
  }

  body {
    min-height: 100vh;
    background: #0a1f17;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    font-family: 'Jost', sans-serif;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(29,77,58,0.45) 0%, transparent 65%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: linear-gradient(175deg, #122b20 0%, #0a1f17 100%);
    border: 1px solid rgba(200,185,154,0.15);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,185,154,0.06);
    animation: rise 1s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* HERO FOTO */
  .hero {
    position: relative;
    height: 340px;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
    filter: brightness(0.88) saturate(0.9); background: #0D2E24;
  }

  /* Gradiente sobre a foto */
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,31,23,0) 30%,
      rgba(10,31,23,0.5) 65%,
      rgba(10,31,23,0.95) 100%
    );
  }

  /* Arco decorativo SVG no topo da foto */
  .hero-top-arc {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 2;
    display: flex;
    justify-content: flex-end;
    padding: 14px 16px;
  }

  .hero-logo {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(10,31,23,0.6);
    border: 1px solid rgba(200,185,154,0.3);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }

  .logo-img-small {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }

  /* Nome sobre a foto */
  .hero-info {
    position: absolute;
    bottom: 20px; left: 24px; right: 24px;
    z-index: 3;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300;
    color: var(--offwhite);
    letter-spacing: 0.5px;
    line-height: 1.15;
    margin-bottom: 4px;
  }
  .hero-name em { font-style: italic; color: var(--gold-light); }

  .hero-title {
    font-size: 9.5px; font-weight: 300;
    letter-spacing: 3.5px; text-transform: uppercase;
    color: var(--gold);
  }

  /* ONDA decorativa */
  .wave {
    display: block;
    width: 100%;
    margin-top: -2px;
    fill: #0D2E24;
  }

  /* CAU badge */
  .cau-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 0 2px;
  }
  .cau-text {
    font-size: 9px; font-weight: 300;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(200,185,154,0.4);
    padding: 4px 14px;
    border: 1px solid rgba(200,185,154,0.12);
    border-radius: 20px;
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 24px 10px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,185,154,0.2), transparent);
  }
  .divider span { font-size: 10px; letter-spacing: 4px; color: var(--gold); opacity: 0.4; }

  /* CONTACTS */
  .contacts { padding: 4px 20px 16px; display: flex; flex-direction: column; gap: 2px; }

  .contact-item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s ease;
    animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  .contact-item:nth-child(1) { animation-delay: 0.15s; }
  .contact-item:nth-child(2) { animation-delay: 0.22s; }
  .contact-item:nth-child(3) { animation-delay: 0.29s; }
  .contact-item:nth-child(4) { animation-delay: 0.36s; }

  .contact-item:hover { background: rgba(200,185,154,0.06); }

  .contact-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(200,185,154,0.07);
    border: 1px solid rgba(200,185,154,0.14);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .contact-info { flex: 1; }
  .contact-label {
    font-size: 9px; font-weight: 300;
    letter-spacing: 2.5px; text-transform: uppercase;
    color: rgba(200,185,154,0.4);
    margin-bottom: 2px;
  }
  .contact-value {
    font-size: 13px; font-weight: 300;
    color: var(--offwhite); letter-spacing: 0.3px;
  }
  .contact-arrow {
    font-size: 13px; color: rgba(200,185,154,0.2);
    transition: color 0.2s, transform 0.2s;
  }
  .contact-item:hover .contact-arrow { color: var(--gold); transform: translateX(3px); }

  /* TAGLINE */
  .tagline-wrap {
    text-align: center;
    padding: 8px 24px 16px;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-style: italic;
    color: rgba(240,237,230,0.28);
    letter-spacing: 0.3px;
  }

  /* SAVE BUTTON */
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 20px 24px;
    padding: 15px;
    background: linear-gradient(135deg, rgba(200,185,154,0.14), rgba(200,185,154,0.05));
    border: 1px solid rgba(200,185,154,0.28);
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .save-btn:hover {
    background: rgba(200,185,154,0.2);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .save-btn span {
    font-size: 10px; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold-light);
  }

  /* location tag */
  .location {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding-bottom: 20px;
  }
  .location span {
    font-size: 9px; font-weight: 300;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(200,185,154,0.35);
  }
</style>
</head>
