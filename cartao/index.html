<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ana Carla Sella | Arquiteta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a1f17;
  --card: #0D2E24;
  --green: #0D2E24;
  --green-mid: #153D2F;
  --gold: #C8B99A;
  --dark: #F0EDE6;
  --text: #F0EDE6;
  --muted: #C8B99A;
}

body {
  min-height: 100vh;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 30%, rgba(29,77,58,0.5) 0%, transparent 65%);
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  font-family: 'Jost', sans-serif;
}

.card {
  width: 100%; max-width: 100%;
  background: var(--card);
  border-radius: 0;
  overflow: visible;
  box-shadow: 0 40px 100px rgba(0,0,0,0.6);
  animation: rise 0.9s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── TOP ARC ── */
.top-arc {
  background: linear-gradient(160deg, #153D2F 0%, #0D2E24 100%);
  height: 170px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 0;
}

/* curva branca na base do arco */
.top-arc::after {
  content: '';
  position: absolute;
  bottom: -38px; left: 0; right: 0;
  height: 76px;
  background: #0D2E24;
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}

/* Logo centralizada no topo do arco */
.arc-logo {
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  width: 220px; height: 220px;
  border-radius: 50%;
  overflow: visible;
  border: none;
  box-shadow: none;
}
.arc-logo img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

/* Foto circular centralizada na base do arco */
.arc-photo {
  position: absolute;
  bottom: -52px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  width: 108px; height: 108px;
  border-radius: 50%;
  padding: 3px;
  background: conic-gradient(var(--gold) 0deg, #0D2E24 90deg, var(--gold) 180deg, #0D2E24 270deg, var(--gold) 360deg);
  animation: none;
}
@keyframes spin { to { transform: rotate(360deg) translateX(-50%); } }

/* Override to keep centered while spinning */
.arc-photo {
  animation: none;
}
.arc-photo-ring {
  width: 108px; height: 108px;
  border-radius: 50%;
  padding: 3px;
  background: conic-gradient(var(--gold) 0deg, #0D2E24 90deg, var(--gold) 180deg, #0D2E24 270deg, var(--gold) 360deg);
  animation: none;
  position: absolute;
  bottom: -52px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
}
@keyframes spinring { to { transform: translateX(-50%) rotate(360deg); } }

.arc-photo-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: var(--card);
  padding: 3px;
}
.arc-photo-img {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  object-position: center 10%;
  display: block;
}

/* ── INFO ── */
.info {
  padding: 68px 28px 0;
  text-align: center;
  max-width: 340px;
  margin: 0 auto;
}
.name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 300;
  color: #F0EDE6; letter-spacing: 0.5px; line-height: 1.2;
  margin-bottom: 5px;
}
.name em { font-style: italic; color: #C8B99A; }
.title {
  font-size: 9.5px; font-weight: 400;
  letter-spacing: 3.5px; text-transform: uppercase;
  color: #C8B99A; margin-bottom: 4px;
}
.cau {
  font-size: 9px; font-weight: 300;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(200,185,154,0.7);
  margin-bottom: 20px;
}

/* ── DIVIDER ── */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 0 28px 20px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, rgba(200,185,154,0.25), transparent);
}
.divider span { font-size: 10px; letter-spacing: 4px; color: #C8B99A; }

/* ── ICON ROW ── */
.icon-row {
  display: flex; justify-content: center; gap: 18px;
  margin: 0 auto 22px;
  max-width: 340px;
  padding: 0 20px;
}
.icon-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  text-decoration: none; transition: transform 0.2s;
}
.icon-btn:hover { transform: translateY(-3px); }
.icon-circle {
  width: 54px; height: 54px; border-radius: 50%;
  background: linear-gradient(145deg, #1e5a3e, #153D2F);
  box-shadow: 3px 3px 8px rgba(0,0,0,0.3), -1px -1px 4px rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
}
.icon-label {
  font-size: 8.5px; font-weight: 300;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #C8B99A;
}

/* ── LOCATION ── */
.location-row {
  display: flex; gap: 8px;
  padding: 0 20px 18px;
  max-width: 340px;
  margin: 0 auto;
}
.loc-card {
  flex: 1; padding: 10px 12px;
  background: linear-gradient(145deg, #1e5a3e, #153D2F);
  border-radius: 12px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
  display: flex; flex-direction: column; gap: 3px;
}
.loc-label {
  font-size: 8px; font-weight: 300;
  letter-spacing: 2px; text-transform: uppercase; color: #C8B99A;
}
.loc-value { font-size: 11px; font-weight: 300; color: #F0EDE6; }

/* ── SAVE ── */
.save-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin: 0 20px 18px;
  padding: 15px; background: rgba(200,185,154,0.12); border: 1px solid rgba(200,185,154,0.35);
  border-radius: 12px; border: none; cursor: pointer;
  width: calc(100% - 40px);
  box-shadow: 0 4px 16px rgba(13,46,36,0.3);
  transition: background 0.2s;
}
.save-btn:hover { background: rgba(200,185,154,0.2); }
.save-btn span {
  font-size: 10px; font-weight: 400;
  letter-spacing: 3px; text-transform: uppercase;
  color: #DDD0B8;
}

/* ── TAGLINE ── */
.tagline {
  text-align: center; padding: 0 20px 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 12.5px; font-style: italic; color: #C8B99A;
}
</style>
</head>
